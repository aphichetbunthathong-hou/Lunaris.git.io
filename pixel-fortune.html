<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ดูดวงพิกเซล — Thai Pixel Oracle</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ─── PIXEL PALETTE ─────────────────────────── */
:root {
  --sky1:#FFB5C8; --sky2:#C8A8E9; --sky3:#A8D8EA;
  --ground:#5B9E4F; --ground2:#3D7A33;
  --pixel-pink:#FF69B4; --pixel-purple:#C084FC;
  --pixel-yellow:#FFD700; --pixel-cyan:#67E8F9;
  --pixel-orange:#FB923C; --pixel-green:#4ADE80;
  --pixel-red:#F87171; --pixel-blue:#60A5FA;
  --dark:#1a0a2e; --darker:#0d0620;
  --text-light:#FFF5FF; --text-muted:#D8B4FE;
  --card-bg:rgba(20,8,40,0.88);
  --border-pixel:#C084FC;
  --gold:#FFD700; --gold2:#FFA500;
}
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated}
html{font-size:16px}
body{
  font-family:'Sarabun',sans-serif;
  background:var(--darker);
  min-height:100vh;
  overflow-x:hidden;
  cursor:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20'><text y='16' font-size='16'>✨</text></svg>") 8 8, auto;
}

/* ─── PIXEL SKY BG ────────────────────────── */
.sky-bg {
  position:fixed; inset:0; z-index:0;
  background: linear-gradient(180deg,
    #2D1B5E 0%, #4A2C8A 20%, #7B4AB8 40%,
    #C4729C 65%, #F0A07A 80%, #F5C08A 100%);
}
/* pixel clouds */
.cloud {
  position:fixed; image-rendering:pixelated;
  animation: cloudDrift linear infinite;
  opacity:0.7;
}
@keyframes cloudDrift { from{transform:translateX(-200px)} to{transform:translateX(110vw)} }

/* pixel ground strip */
.ground-strip {
  position:fixed; bottom:0; left:0; right:0; height:120px; z-index:1;
  background: repeating-linear-gradient(
    0deg,
    var(--ground2) 0px, var(--ground2) 8px,
    var(--ground) 8px, var(--ground) 16px
  );
  box-shadow: inset 0 4px 0 rgba(255,255,255,0.15);
}
.ground-strip::before {
  content:'';
  position:absolute; top:-8px; left:0; right:0; height:8px;
  background: repeating-linear-gradient(90deg,
    var(--ground) 0,var(--ground) 8px,
    var(--ground2) 8px,var(--ground2) 16px,
    var(--pixel-green) 16px,var(--pixel-green) 24px,
    var(--ground) 24px,var(--ground) 32px
  );
}

/* pixel stars */
.star-layer { position:fixed; inset:0; z-index:0; pointer-events:none }
.px-star {
  position:absolute; width:4px; height:4px;
  background:white; image-rendering:pixelated;
  animation: starBlink 2s steps(2,end) infinite;
}
@keyframes starBlink { 0%,100%{opacity:1} 50%{opacity:0} }

/* floating pixel characters */
.float-char {
  position:fixed; z-index:2; pointer-events:none;
  animation: floatBob 3s ease-in-out infinite alternate;
  image-rendering:pixelated;
}
@keyframes floatBob {
  from{transform:translateY(0px)} to{transform:translateY(-14px)}
}

/* ─── MAIN LAYOUT ──────────────────────────── */
.page-wrap {
  position:relative; z-index:10;
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center;
  padding:16px 12px 100px;
}

/* ─── HEADER ───────────────────────────────── */
.pixel-header {
  text-align:center; margin-bottom:20px;
  padding-top:10px;
}
.header-badge {
  display:inline-block;
  background:var(--darker);
  border:4px solid var(--gold);
  box-shadow: 4px 4px 0 var(--gold2), inset 2px 2px 0 rgba(255,215,0,.2);
  padding:8px 20px 10px;
  margin-bottom:14px;
  position:relative;
}
.header-badge::before,.header-badge::after {
  content:'★';
  position:absolute; top:50%; transform:translateY(-50%);
  color:var(--gold); font-size:1rem;
}
.header-badge::before{left:8px} .header-badge::after{right:8px}
.header-title {
  font-family:'Press Start 2P', monospace;
  font-size:clamp(0.65rem,2.5vw,0.95rem);
  color:var(--gold);
  text-shadow: 2px 2px 0 var(--gold2), 4px 4px 0 rgba(0,0,0,.5);
  line-height:1.6; letter-spacing:0.02em;
}
.header-sub {
  font-family:'Sarabun',sans-serif;
  font-size:clamp(0.7rem,2vw,0.85rem);
  color:var(--pixel-cyan);
  margin-top:6px; letter-spacing:0.1em;
  text-shadow: 1px 1px 0 rgba(0,0,0,.8);
}

/* pixel sprite marquee */
.sprite-row {
  display:flex; justify-content:center; gap:16px;
  margin:8px 0 16px; flex-wrap:wrap;
}
.sprite-icon {
  width:32px; height:32px;
  animation: floatBob 2.5s ease-in-out infinite alternate;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,.4));
  cursor:pointer; transition:transform .1s;
  image-rendering:pixelated;
}
.sprite-icon:hover{transform:scale(1.4) rotate(-5deg)!important}
.sprite-icon:nth-child(2){animation-delay:.3s}
.sprite-icon:nth-child(3){animation-delay:.6s}
.sprite-icon:nth-child(4){animation-delay:.9s}
.sprite-icon:nth-child(5){animation-delay:1.2s}
.sprite-icon:nth-child(6){animation-delay:1.5s}
.sprite-icon:nth-child(7){animation-delay:1.8s}

/* ─── PIXEL CARD ───────────────────────────── */
.pixel-card {
  background:var(--card-bg);
  border:4px solid var(--border-pixel);
  box-shadow:
    6px 6px 0 rgba(192,132,252,.4),
    inset 0 0 30px rgba(160,100,255,.08),
    0 0 40px rgba(192,132,252,.2);
  border-radius:0;
  width:100%; max-width:480px;
  padding:20px;
  position:relative;
  overflow:hidden;
}
.pixel-card::before {
  content:'';
  position:absolute; inset:4px;
  border:2px solid rgba(192,132,252,.25);
  pointer-events:none;
}
/* corner decorations */
.pixel-card::after {
  content:'';
  position:absolute;
  top:0;left:0;right:0; height:4px;
  background:repeating-linear-gradient(90deg,
    var(--pixel-pink) 0,var(--pixel-pink) 8px,
    var(--pixel-purple) 8px,var(--pixel-purple) 16px,
    var(--pixel-cyan) 16px,var(--pixel-cyan) 24px,
    var(--pixel-yellow) 24px,var(--pixel-yellow) 32px
  );
}
.card-corner {
  position:absolute; width:16px; height:16px;
  background:var(--gold);
  box-shadow:inset -2px -2px 0 var(--gold2);
}
.cc-tl{top:0;left:0} .cc-tr{top:0;right:0} .cc-bl{bottom:0;left:0} .cc-br{bottom:0;right:0}

.card-title {
  font-family:'Press Start 2P', monospace;
  font-size:0.6rem; color:var(--pixel-cyan);
  text-align:center; margin-bottom:16px;
  letter-spacing:0.05em;
  text-shadow:1px 1px 0 rgba(0,0,0,.8);
}
.card-title span{color:var(--pixel-pink)}

/* ─── FORM ELEMENTS ─────────────────────────── */
.form-row { display:flex; gap:8px; margin-bottom:12px; }
.form-group { flex:1; display:flex; flex-direction:column; gap:5px; }
.pixel-label {
  font-family:'Press Start 2P', monospace;
  font-size:0.45rem; color:var(--pixel-yellow);
  letter-spacing:0.05em; text-shadow:1px 1px 0 rgba(0,0,0,.8);
}
.pixel-input, .pixel-select {
  background:#0d0620;
  border:3px solid var(--pixel-purple);
  color:var(--text-light);
  font-family:'Sarabun',sans-serif;
  font-size:0.95rem; font-weight:600;
  padding:8px 10px;
  outline:none;
  transition:border-color .1s;
  width:100%;
  box-shadow: 3px 3px 0 rgba(192,132,252,.3);
  border-radius:0;
  -webkit-appearance:none; appearance:none;
}
.pixel-input:focus, .pixel-select:focus {
  border-color:var(--pixel-cyan);
  box-shadow: 3px 3px 0 rgba(103,232,249,.4);
  background:#150830;
}
.pixel-input::placeholder{color:rgba(255,255,255,.3)}
.select-wrap { position:relative }
.select-wrap::after {
  content:'▼'; position:absolute; right:10px; top:50%;
  transform:translateY(-50%);
  color:var(--pixel-yellow); font-size:0.6rem;
  pointer-events:none;
}
.pixel-select option{background:#0d0620;color:var(--text-light)}

/* ─── BUTTON ────────────────────────────────── */
.pixel-btn {
  display:block; width:100%;
  background:linear-gradient(180deg,#FF79C6,#BD5EAA);
  border:none; border-bottom:5px solid #7B2D6E;
  border-right:5px solid #7B2D6E;
  color:white;
  font-family:'Press Start 2P', monospace;
  font-size:0.55rem;
  letter-spacing:0.08em;
  padding:12px 16px;
  cursor:pointer;
  text-transform:uppercase;
  transition:all .1s;
  text-shadow:1px 2px 0 rgba(0,0,0,.5);
  box-shadow: 0 0 20px rgba(255,121,198,.4);
  margin-top:4px;
  position:relative; overflow:hidden;
}
.pixel-btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2) 0%,transparent 50%);
}
.pixel-btn:hover{
  background:linear-gradient(180deg,#FF93D2,#D068BF);
  box-shadow:0 0 35px rgba(255,121,198,.7);
  transform:translateY(-2px);
}
.pixel-btn:active{
  transform:translateY(3px);
  border-bottom-width:2px; border-right-width:2px;
}

/* ─── RESULT PANEL ──────────────────────────── */
.result-panel {
  width:100%; max-width:480px;
  margin-top:14px;
  display:none;
  animation:fadePixel .4s steps(4,end);
}
@keyframes fadePixel {
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
.result-panel.show{display:block}

/* result header with character */
.result-header {
  display:flex; align-items:center; gap:12px;
  background:var(--card-bg);
  border:4px solid var(--gold);
  box-shadow:4px 4px 0 rgba(255,215,0,.3);
  padding:12px 16px;
  margin-bottom:10px;
  position:relative;
}
.result-header::after{
  content:'';
  position:absolute;
  bottom:-4px; left:0; right:0; height:4px;
  background:repeating-linear-gradient(90deg,
    var(--gold) 0,var(--gold) 8px,
    var(--gold2) 8px,var(--gold2) 16px
  );
}
.char-sprite {
  width:56px; height:56px; flex-shrink:0;
  image-rendering:pixelated;
  animation:floatBob 2s ease-in-out infinite alternate;
}
.result-name-block {}
.result-day-label {
  font-family:'Press Start 2P', monospace;
  font-size:0.55rem; color:var(--pixel-cyan);
  margin-bottom:4px;
}
.result-day-name {
  font-family:'Press Start 2P', monospace;
  font-size:0.85rem; color:var(--gold);
  text-shadow:2px 2px 0 var(--gold2), 3px 3px 0 rgba(0,0,0,.5);
}
.result-day-en {
  font-size:0.7rem; color:var(--text-muted);
  margin-top:2px; font-family:'Sarabun',sans-serif;
}

/* stat bars */
.stat-section {
  background:var(--card-bg);
  border:4px solid var(--pixel-purple);
  box-shadow:4px 4px 0 rgba(192,132,252,.3);
  padding:14px;
  margin-bottom:10px;
}
.stat-title {
  font-family:'Press Start 2P', monospace;
  font-size:0.5rem; color:var(--pixel-yellow);
  margin-bottom:10px; text-align:center;
}
.stat-row { margin-bottom:8px }
.stat-label-row {
  display:flex; justify-content:space-between;
  margin-bottom:3px;
}
.stat-name {
  font-size:0.78rem; color:var(--text-light);
  font-family:'Sarabun',sans-serif;
}
.stat-score {
  font-family:'Press Start 2P', monospace;
  font-size:0.45rem; color:var(--pixel-yellow);
}
.pixel-bar-track {
  height:12px; background:#1a0a2e;
  border:2px solid rgba(255,255,255,.15);
  overflow:hidden;
}
.pixel-bar-fill {
  height:100%;
  transition:width .8s steps(8,end);
  image-rendering:pixelated;
}

/* prophecy cards */
.prophecy-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:8px; margin-bottom:10px;
}
.proph-card {
  background:var(--card-bg);
  border:3px solid;
  padding:10px;
  position:relative; overflow:hidden;
}
.proph-card::after {
  content:attr(data-icon);
  position:absolute; bottom:-2px; right:4px;
  font-size:1.4rem; opacity:.15;
}
.proph-title {
  font-family:'Press Start 2P', monospace;
  font-size:0.42rem; margin-bottom:6px;
}
.proph-text {
  font-family:'Sarabun',sans-serif;
  font-size:0.75rem; color:var(--text-light);
  line-height:1.5;
}
.proph-card.love{border-color:var(--pixel-pink)} .proph-card.love .proph-title{color:var(--pixel-pink)}
.proph-card.money{border-color:var(--pixel-yellow)} .proph-card.money .proph-title{color:var(--pixel-yellow)}
.proph-card.health{border-color:var(--pixel-green)} .proph-card.health .proph-title{color:var(--pixel-green)}
.proph-card.luck{border-color:var(--pixel-cyan)} .proph-card.luck .proph-title{color:var(--pixel-cyan)}

/* lucky items */
.lucky-section {
  background:var(--card-bg);
  border:4px solid var(--pixel-cyan);
  box-shadow:4px 4px 0 rgba(103,232,249,.25);
  padding:14px;
  margin-bottom:10px;
}
.lucky-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:8px; margin-top:10px;
}
.lucky-item {
  text-align:center; padding:8px 4px;
  background:rgba(255,255,255,.05);
  border:2px solid rgba(255,255,255,.1);
}
.lucky-icon {
  font-size:1.4rem; display:block;
  margin-bottom:4px; image-rendering:pixelated;
}
.lucky-label {
  font-family:'Press Start 2P', monospace;
  font-size:0.35rem; color:var(--text-muted);
  display:block; margin-bottom:2px;
}
.lucky-val {
  font-family:'Sarabun',sans-serif;
  font-size:0.75rem; font-weight:700;
  color:var(--text-light);
}

/* falling stars section */
.falling-section {
  background:var(--card-bg);
  border:4px solid var(--pixel-yellow);
  box-shadow:4px 4px 0 rgba(255,215,0,.3);
  padding:14px;
  margin-bottom:10px;
}
.falling-title {
  font-family:'Press Start 2P', monospace;
  font-size:0.5rem; color:var(--pixel-yellow);
  text-align:center; margin-bottom:10px;
}
.falling-grid {
  display:grid; grid-template-columns:repeat(2,1fr);
  gap:8px;
}
.falling-item {
  padding:8px;
  background:rgba(255,215,0,.07);
  border-left:3px solid var(--pixel-yellow);
}
.falling-date {
  font-family:'Press Start 2P', monospace;
  font-size:0.42rem; color:var(--pixel-yellow);
  margin-bottom:3px;
}
.falling-desc {
  font-family:'Sarabun',sans-serif;
  font-size:0.75rem; color:var(--text-light);
  line-height:1.4;
}

/* big prophecy text */
.big-proph {
  background:var(--card-bg);
  border:4px solid var(--pixel-purple);
  box-shadow:4px 4px 0 rgba(192,132,252,.3);
  padding:16px;
  margin-bottom:10px;
}
.big-proph-title {
  font-family:'Press Start 2P', monospace;
  font-size:0.5rem; color:var(--pixel-purple);
  text-align:center; margin-bottom:10px;
}
.big-proph-text {
  font-family:'Sarabun',sans-serif;
  font-size:0.88rem; color:var(--text-light);
  line-height:1.8; text-align:justify;
}

/* share btn */
.share-btn {
  display:block; width:100%;
  background:linear-gradient(180deg,#60A5FA,#3B82F6);
  border:none; border-bottom:4px solid #1D4ED8; border-right:4px solid #1D4ED8;
  color:white; font-family:'Press Start 2P', monospace;
  font-size:0.5rem; padding:10px;
  cursor:pointer; text-align:center;
  transition:all .1s;
}
.share-btn:active{transform:translate(2px,2px);border-bottom-width:2px;border-right-width:2px}

/* pixel divider */
.px-divider {
  height:4px; margin:10px 0;
  background:repeating-linear-gradient(90deg,
    var(--pixel-pink) 0,var(--pixel-pink) 8px,
    var(--pixel-purple) 8px,var(--pixel-purple) 16px,
    var(--pixel-cyan) 16px,var(--pixel-cyan) 24px,
    var(--pixel-yellow) 24px,var(--pixel-yellow) 32px
  );
}

/* loading animation */
.loading-dots {
  display:flex; justify-content:center; gap:8px;
  padding:20px 0;
}
.ld {
  width:12px; height:12px; background:var(--pixel-pink);
  animation:ldBlink 1s steps(2,end) infinite;
}
.ld:nth-child(2){background:var(--pixel-yellow);animation-delay:.33s}
.ld:nth-child(3){background:var(--pixel-cyan);animation-delay:.66s}
@keyframes ldBlink{0%,100%{opacity:1;transform:translateY(0)}50%{opacity:0;transform:translateY(-8px)}}

/* ─── PIXEL SPRITES via SVG in CSS ────────────── */
/* canvas for pixel character */
canvas.sprite-canvas {
  image-rendering:pixelated;
  display:block;
}

/* sparkle overlay */
.sparkle-overlay {
  position:fixed; inset:0; pointer-events:none; z-index:5;
  overflow:hidden;
}
.sp {
  position:absolute;
  width:8px; height:8px;
  background:var(--pixel-yellow);
  animation:spFall linear infinite;
  image-rendering:pixelated;
}
@keyframes spFall {
  0%{transform:translateY(-20px) rotate(0);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* ─── RESPONSIVE ─────────────────────────────── */
@media(max-width:400px){
  .prophecy-grid{grid-template-columns:1fr}
  .lucky-grid{grid-template-columns:repeat(2,1fr)}
  .falling-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Sky BG -->
<div class="sky-bg"></div>

<!-- Stars -->
<div class="star-layer" id="starLayer"></div>

<!-- Sparkle overlay -->
<div class="sparkle-overlay" id="sparkleOverlay"></div>

<!-- Ground -->
<div class="ground-strip"></div>

<!-- Page -->
<div class="page-wrap">

  <!-- HEADER -->
  <div class="pixel-header">
    <div class="header-badge">
      <div class="header-title">THAI PIXEL ORACLE<br>ดูดวงพิกเซล</div>
    </div>
    <div class="header-sub">⚡ ดูดวงตามวันเดือนปีเกิด · โหราศาสตร์ไทย ⚡</div>

    <!-- Pixel sprite row using canvas -->
    <div class="sprite-row" id="spriteRow"></div>
  </div>

  <!-- INPUT CARD -->
  <div class="pixel-card" id="inputCard">
    <div class="card-corner cc-tl"></div>
    <div class="card-corner cc-tr"></div>
    <div class="card-corner cc-bl"></div>
    <div class="card-corner cc-br"></div>

    <div class="card-title">INSERT YOUR <span>BIRTH DATE</span></div>

    <div class="form-row">
      <div class="form-group" style="flex:0.8">
        <label class="pixel-label">วัน</label>
        <input class="pixel-input" type="number" id="bDay" min="1" max="31" placeholder="01">
      </div>
      <div class="form-group" style="flex:1.2">
        <label class="pixel-label">เดือน</label>
        <div class="select-wrap">
          <select class="pixel-select" id="bMonth">
            <option value="1">มกราคม</option><option value="2">กุมภาพันธ์</option>
            <option value="3">มีนาคม</option><option value="4">เมษายน</option>
            <option value="5">พฤษภาคม</option><option value="6">มิถุนายน</option>
            <option value="7">กรกฎาคม</option><option value="8">สิงหาคม</option>
            <option value="9">กันยายน</option><option value="10">ตุลาคม</option>
            <option value="11">พฤศจิกายน</option><option value="12">ธันวาคม</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="flex:1">
        <label class="pixel-label">ปี (พ.ศ.)</label>
        <input class="pixel-input" type="number" id="bYear" min="2400" max="2600" placeholder="2530">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="pixel-label">ชั่วโมงเกิด (ถ้าทราบ)</label>
        <input class="pixel-input" type="number" id="bHour" min="0" max="23" placeholder="เช่น 13 (ไม่บังคับ)">
      </div>
      <div class="form-group">
        <label class="pixel-label">นาทีเกิด</label>
        <input class="pixel-input" type="number" id="bMin" min="0" max="59" placeholder="00">
      </div>
    </div>

    <div class="px-divider"></div>

    <button class="pixel-btn" onclick="castFortune()">
      ✦ ดูดวงเลย / CAST SPELL ✦
    </button>
  </div>

  <!-- RESULT PANEL -->
  <div class="result-panel" id="resultPanel">

    <!-- Day header -->
    <div class="result-header">
      <canvas class="char-sprite" id="charCanvas" width="56" height="56"></canvas>
      <div class="result-name-block">
        <div class="result-day-label">วันเกิดของคุณคือ</div>
        <div class="result-day-name" id="rDayName">—</div>

function getFallingDays(dayOfWeek, birthDay, birthMonth, birthYear){
  // วันตกฝาก based on birth weekday — traditional Thai astrology
  const fallingRules = {
    0:['วันพุธกลางคืน','วันศุกร์'], // อาทิตย์
    1:['วันพุธ','วันเสาร์'],          // จันทร์
    2:['วันอาทิตย์','วันพฤหัสบดี'],   // อังคาร
    3:['วันอาทิตย์','วันพฤหัสบดี'],   // พุธ (กลางวัน)
    4:['วันอังคาร','วันเสาร์'],         // พฤหัสบดี
    5:['วันพุธกลางคืน','วันอาทิตย์'],  // ศุกร์
    6:['วันจันทร์','วันพุธกลางวัน'],   // เสาร์
  };
  const warn={
    0:'วันพุธกลางคืนและวันศุกร์ — ระวังการตัดสินใจสำคัญ เดินทางไกล และเริ่มกิจการใหม่',
    1:'วันพุธและวันเสาร์ — ไม่ควรย้ายบ้าน ลงนามสัญญา หรือเริ่มความสัมพันธ์ใหม่',
    2:'วันอาทิตย์และวันพฤหัสบดี — ระวังการทะเลาะเบาะแว้ง และการตัดสินใจทางการเงิน',
    3:'วันอาทิตย์และวันพฤหัสบดี — ระวังเรื่องสุขภาพและการเดินทางระยะไกล',
    4:'วันอังคารและวันเสาร์ — ไม่ควรเริ่มโครงการใหม่หรือทำธุรกิจสำคัญ',

    const diff=(dn-nxt.getDay()+7)%7||7;
    nxt.setDate(nxt.getDate()+diff);
    results.push({label:d,date:`${nxt.getDate()}/${nxt.getMonth()+1}/${nxt.getFullYear()+543}`,full:`${DAYS[nxt.getDay()]}ที่ ${nxt.getDate()} เดือน ${nxt.getMonth()+1}`});
  });
  return {days:results, warn:warn[dayOfWeek]||''};
}

// ─── PIXEL CHARACTER SPRITES (canvas-drawn) ─────────────────
const DAY_CHAR_COLORS = [
  {body:'#FF6B35',hair:'#FFD700',skin:'#FDBCB4',dress:'#FF4444',eye:'#8B4513'},  // Sun
  {body:'#87CEEB',hair:'#C0C0C0',skin:'#FDBCB4',dress:'#4169E1',eye:'#4169E1'},  // Mon
  {body:'#FF6B6B',hair:'#8B0000',skin:'#FDBCB4',dress:'#DC143C',eye:'#8B0000'},  // Tue
  {body:'#90EE90',hair:'#228B22',skin:'#FDBCB4',dress:'#2E8B57',eye:'#006400'},  // Wed
  {body:'#FFA500',hair:'#8B4513',skin:'#FDBCB4',dress:'#FF8C00',eye:'#8B4513'},  // Thu
  {body:'#FFB6C1',hair:'#FF69B4',skin:'#FDBCB4',dress:'#FF1493',eye:'#FF69B4'},  // Fri
  {body:'#9370DB',hair:'#4B0082',skin:'#FDBCB4',dress:'#8B008B',eye:'#4B0082'},  // Sat
];

function drawPixelChar(canvas, dayIdx, scale=2){
  const c=DAY_CHAR_COLORS[dayIdx];
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const px=(x,y,w,h,col)=>{ctx.fillStyle=col;ctx.fillRect(x*scale,y*scale,w*scale,h*scale)};
  // hair
  px(4,1,6,1,c.hair); px(3,2,8,1,c.hair); px(3,3,2,1,c.hair); px(9,3,2,1,c.hair);
  px(3,8,1,2,c.hair); px(10,8,1,2,c.hair);
  // face
  px(4,3,6,5,c.skin);
  // eyes
  px(5,5,1,1,c.eye); px(8,5,1,1,c.eye);
  // mouth
  px(6,7,2,1,'#FF8888');
  // dress/body
  px(4,8,6,4,c.dress); px(3,9,1,3,c.body); px(10,9,1,3,c.body);
  // arms
  px(2,9,2,1,c.skin); px(10,9,2,1,c.skin);
  // legs
  px(5,12,2,2,c.skin); px(7,12,2,2,c.skin);
  // shoes
  px(4,14,3,1,c.body); px(7,14,3,1,c.body);
  // antenna/magic
  px(7,0,1,2,c.hair); px(6,0,1,1,c.dress); px(8,0,1,1,c.dress);
}

// Mini sprites for sprite row (16x16)
function drawMiniSprite(canvas, idx){
  const c=DAY_CHAR_COLORS[idx];
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,16,16);
  const px=(x,y,w,h,col)=>{ctx.fillStyle=col;ctx.fillRect(x,y,w,h)};
  px(5,1,6,1,c.hair); px(4,2,8,1,c.hair);
  px(5,2,6,4,c.skin);
  px(6,4,1,1,c.eye); px(9,4,1,1,c.eye);
  px(4,6,8,4,c.dress);
  px(3,7,2,1,c.skin); px(11,7,2,1,c.skin);
  px(5,10,3,2,c.skin); px(8,10,3,2,c.skin);
}

// ─── BUILD STAR LAYER ───────────────────────────────────────
function buildStars(){
  const sl=document.getElementById('starLayer');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='px-star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*60}%;animation-delay:${Math.random()*3}s;animation-duration:${1+Math.random()*2}s;width:${Math.random()<.3?8:4}px;height:${Math.random()<.3?8:4}px;opacity:${0.3+Math.random()*.7}`;
    sl.appendChild(s);
  }
}

// sparkle particles
function buildSparkles(){
  const so=document.getElementById('sparkleOverlay');
  for(let i=0;i<25;i++){
    const sp=document.createElement('div');
    sp.className='sp';
    sp.style.cssText=`left:${Math.random()*100}%;animation-duration:${4+Math.random()*6}s;animation-delay:${Math.random()*6}s;width:${Math.random()<.3?12:6}px;height:${Math.random()<.3?12:6}px;background:${['#FFD700','#FF79C6','#67E8F9','#C084FC'][Math.floor(Math.random()*4)]}`;
    so.appendChild(sp);
  }
}

// sprite row
function buildSpriteRow(){
  const row=document.getElementById('spriteRow');
  row.innerHTML='';
  for(let i=0;i<7;i++){
    const cv=document.createElement('canvas');
    cv.width=16; cv.height=16;
    cv.className='sprite-icon';
    cv.title=DAYS[i];
    drawMiniSprite(cv,i);
    row.appendChild(cv);
  }
}

// ─── MAIN FORTUNE FUNCTION ───────────────────────────────────
function castFortune(){
  const d=parseInt(document.getElementById('bDay').value)||0;
  const m=parseInt(document.getElementById('bMonth').value)||1;
  const y=parseInt(document.getElementById('bYear').value)||0;

  if(!d||d<1||d>31||!y||y<2400||y>2600){
    shakeCard(); return;
  }

  const dow=getDayOfWeek(d,m,y);
  const dateFort=DATE_FORTUNE[d]||DATE_FORTUNE[1];
  const {days:fallingDays,warn:fallingWarn}=getFallingDays(dow,d,m,y);

  // render result
  renderResult(dow,dateFort,fallingDays,fallingWarn,d,m,y);
  document.getElementById('resultPanel').classList.add('show');
  document.getElementById('resultPanel').scrollIntoView({behavior:'smooth',block:'start'});
}

function shakeCard(){
  const c=document.getElementById('inputCard');
  c.style.animation='none';
  c.style.transform='translateX(-8px)';
  setTimeout(()=>{c.style.transform='translateX(8px)';
  setTimeout(()=>{c.style.transform='translateX(-6px)';
  setTimeout(()=>{c.style.transform='translateX(6px)';
  setTimeout(()=>{c.style.transform='translateX(0)';},80)},80)},80)},80);
}

function renderResult(dow,df,fallingDays,fallingWarn,d,m,y){
  // Character canvas
  const cc=document.getElementById('charCanvas');
  drawPixelChar(cc,dow,3);

  document.getElementById('rDayName').textContent=`วัน${DAYS[dow]}`;
  document.getElementById('rDayEn').textContent=`Born on ${DAYS_EN[dow]} · ${df.title.split('—')[0].trim()}`;
  document.getElementById('rElement').textContent=DAY_ELEMENTS[dow];

  // Stat bars
  const statColors=['#FF6B35','#FFD700','#FF79C6','#67E8F9','#4ADE80'];
  const statNames=Object.keys(df.stats);
  const statVals=Object.values(df.stats);
  document.getElementById('statBars').innerHTML=statNames.map((n,i)=>`
    <div class="stat-row">
      <div class="stat-label-row">
        <span class="stat-name">${n}</span>
        <span class="stat-score">${statVals[i]}/100</span>
      </div>
      <div class="pixel-bar-track">
        <div class="pixel-bar-fill" style="width:0;background:repeating-linear-gradient(90deg,${statColors[i%5]} 0,${statColors[i%5]} 6px,rgba(0,0,0,.2) 6px,rgba(0,0,0,.2) 8px)"
          data-w="${statVals[i]}"></div>
      </div>
    </div>
  `).join('');
  // animate bars
  setTimeout(()=>document.querySelectorAll('.pixel-bar-fill').forEach(b=>{b.style.width=b.dataset.w+'%'}),100);

  // Prophecy cards
  document.getElementById('prophecyGrid').innerHTML=`
    <div class="proph-card love" data-icon="♥">
      <div class="proph-title">LOVE</div>
      <div class="proph-text">${df.love}</div>
    </div>
    <div class="proph-card money" data-icon="$">
      <div class="proph-title">MONEY</div>
      <div class="proph-text">${df.money}</div>
    </div>
    <div class="proph-card health" data-icon="+">
      <div class="proph-title">HEALTH</div>
      <div class="proph-text">${df.health}</div>
    </div>
    <div class="proph-card luck" data-icon="★">
      <div class="proph-title">LUCK x${df.luck}</div>
      <div class="proph-text">${'★'.repeat(df.luck)}${'☆'.repeat(10-df.luck)}<br>ดาวโชคชะตา ${df.luck}/10</div>
    </div>`;

  // Lucky items
  const lu=df.lucky;
  document.getElementById('luckyGrid').innerHTML=`
    <div class="lucky-item"><span class="lucky-icon">🎨</span><span class="lucky-label">COLOR</span><span class="lucky-val">${lu.color}</span></div>
    <div class="lucky-item"><span class="lucky-icon">🔢</span><span class="lucky-label">NUMBER</span><span class="lucky-val">${lu.number}</span></div>
    <div class="lucky-item"><span class="lucky-icon">📅</span><span class="lucky-label">LUCKY DAY</span><span class="lucky-val">${lu.day}</span></div>
    <div class="lucky-item"><span class="lucky-icon">💎</span><span class="lucky-label">GEM</span><span class="lucky-val">${lu.gem}</span></div>
    <div class="lucky-item"><span class="lucky-icon">🌸</span><span class="lucky-label">FLOWER</span><span class="lucky-val">${lu.flower}</span></div>
    <div class="lucky-item"><span class="lucky-icon">✨</span><span class="lucky-label">ELEMENT</span><span class="lucky-val">${DAY_ELEMENTS[dow].split('(')[0].trim()}</span></div>`;

  // Falling days
  document.getElementById('rFallingDesc').textContent=fallingWarn||'ระวังในวันเหล่านี้เป็นพิเศษ';
  document.getElementById('fallingGrid').innerHTML=fallingDays.map(fd=>`
    <div class="falling-item">
      <div class="falling-date">${fd.label}</div>
      <div class="falling-desc">วันตกฝากถัดไป: ${fd.date}</div>
    </div>`).join('')||'<div style="color:var(--text-muted);font-size:.8rem;font-family:Sarabun">ไม่พบข้อมูลวันตกฝาก</div>';

  // Big prophecy
  document.getElementById('bigProph').textContent=`${df.title} — ${df.power} เกิดวัน${DAYS[dow]}แปลว่าคุณมีพลังพิเศษของดาว${DAYS[dow]}คอยคุ้มครอง ${DAY_ELEMENTS[dow]}เป็นธาตุประจำตัว ชีวิตในปีนี้จะเต็มไปด้วยโอกาสสำคัญ ขอให้ระลึกถึงสิ่งมงคลของคุณในวันที่รู้สึกอ่อนแอ สีมงคล${lu.color} ตัวเลขโชค${lu.number} จะเป็นเพื่อนแท้ตลอดเส้นทาง`;
}

function resetForm(){
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('inputCard').scrollIntoView({behavior:'smooth'});
}

// ─── INIT ───────────────────────────────────────────────────
buildStars();
buildSparkles();
buildSpriteRow();

// Enter key
document.addEventListener('keydown',e=>{if(e.key==='Enter')castFortune();});

// Auto-fill example on click
document.getElementById('bDay').addEventListener('focus',()=>{
  if(!document.getElementById('bDay').value) document.getElementById('bDay').placeholder='เช่น 15';
});
</script>
